<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FastAPI HTML</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

    <h2>Ask a question about your specified file</h2>

    <div class="row">
    <div class="column left"></div>
    <div class="column middle">
        <label for="filenameInput">Filename:</label>&nbsp;
        <input type="text" id="filenameInput" placeholder="example.txt">
    </div>

    <div class="column middle">
        <label for="questionInput">Question:</label>&nbsp;
        <input type="text" id="questionInput" placeholder="Enter your question here">
    </div>
    <div class="column right"></div>
    <br>
    </div>

    <button onclick="submitQuestion()">Submit</button>

    <p id="responseArea"></p>

    <script>
        // 2. Fixed the function name spelling typo
        async function submitQuestion() {
            const filename = document.getElementById('filenameInput').value;
            const question = document.getElementById('questionInput').value;
            const responseArea = document.getElementById('responseArea');

            try {
                
                const response = await fetch('http://127.0.0.1:8000/ask', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ 
                        filename: filename,
                        question: question 
                    }), 
                });

                const result = await response.json();
                if (result.error) {
                    responseArea.innerText = "error" + result.error;
                }else {
                    responseArea.innerText = result.answer;
                }
            } catch (error) {
                console.error('Error:', error);
                responseArea.innerText = "Error sending question.";
            }
        }
    </script>
</body>
</html>
